context:
  version: 4.3.4.1

package:
  name: soma-openslide
  version: ${{ version }}

source:
  git: https://github.com/MIRCen/openslide.git
  tag:  v${{ version }}

build:
  number: 3
  script: |
    export PKG_CONFIG_PATH="$CONDA_PREFIX/lib/pkgconfig"
    meson setup meson_build --prefix=$PREFIX --libdir=lib
    meson install -C meson_build

requirements:
  build:
    - sysroot_linux-64==2.17
    - git
    - ${{ compiler('c') }}
    - pkg-config
    - libtool
    - make
    - meson
    - zlib
    - xorg-kbproto
    - xorg-renderproto
    - xorg-xproto
    - xorg-xextproto
    - openjpeg
    - jxrlib-dev
    - cairo
    - libpng
    - libtiff
    - expat
    - gdk-pixbuf
    - liblzma-devel
    - libxml2-devel
    - glib
    - freetype
    
  run:
    - zlib
    - openjpeg
    - jxrlib
    - cairo
    - libpng
    - libtiff
    - expat
    - gdk-pixbuf
    - liblzma
    - libxml2
    - glib
    
about:
  homepage: https://openslide.org
  summary: OPENSLIDE is a C library for reading virtual slide images (with CZI format support)
  description: |
    OPENSLIDE is a C library for reading virtual slide images (with CZI format support)
